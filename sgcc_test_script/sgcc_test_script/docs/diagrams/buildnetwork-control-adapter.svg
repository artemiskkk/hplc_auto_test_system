<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="940" viewBox="0 0 1600 940">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111"/>
    </marker>
    <style>
      .title{font:700 32px Arial,sans-serif;fill:#111}
      .h{font:700 22px Arial,sans-serif;fill:#111}
      .t{font:400 18px Arial,sans-serif;fill:#111}
      .small{font:400 15px Arial,sans-serif;fill:#111}
      .box{fill:#fff;stroke:#111;stroke-width:3}
      .soft{fill:#f5f5f5;stroke:#111;stroke-width:3}
      .warn{fill:#fff;stroke:#111;stroke-width:3;stroke-dasharray:9 7}
      .line{stroke:#111;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .dline{stroke:#111;stroke-width:3;fill:none;stroke-dasharray:9 7;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1600" height="940" fill="#fff"/>
  <text x="800" y="50" class="title" text-anchor="middle">BuildNetwork_GW and controlDvc Adapter</text>

  <rect x="60" y="95" width="330" height="705" rx="10" class="soft"/>
  <text x="225" y="135" class="h" text-anchor="middle">BuildNetwork_GW</text>
  <rect x="95" y="175" width="260" height="48" rx="5" class="box"/><text x="225" y="205" class="t" text-anchor="middle">Set BaudRate</text>
  <rect x="95" y="245" width="260" height="48" rx="5" class="box"/><text x="225" y="275" class="t" text-anchor="middle">Power Off</text>
  <rect x="95" y="315" width="260" height="48" rx="5" class="box"/><text x="225" y="345" class="t" text-anchor="middle">Power On</text>
  <rect x="95" y="385" width="260" height="48" rx="5" class="box"/><text x="225" y="415" class="t" text-anchor="middle">Module Reset</text>
  <rect x="95" y="455" width="260" height="48" rx="5" class="box"/><text x="225" y="485" class="t" text-anchor="middle">Assign Address</text>
  <rect x="95" y="525" width="260" height="48" rx="5" class="box"/><text x="225" y="555" class="t" text-anchor="middle">01F2 / 01F1 Init</text>
  <rect x="95" y="595" width="260" height="48" rx="5" class="box"/><text x="225" y="625" class="t" text-anchor="middle">05F16 Set Freq</text>
  <rect x="95" y="665" width="260" height="48" rx="5" class="box"/><text x="225" y="695" class="t" text-anchor="middle">11F1 Add Nodes</text>
  <rect x="95" y="735" width="260" height="48" rx="5" class="box"/><text x="225" y="765" class="t" text-anchor="middle">10F21 Query Topology</text>
  <path d="M225 223 L225 245" class="line"/><path d="M225 293 L225 315" class="line"/><path d="M225 363 L225 385" class="line"/><path d="M225 433 L225 455" class="line"/><path d="M225 503 L225 525" class="line"/><path d="M225 573 L225 595" class="line"/><path d="M225 643 L225 665" class="line"/><path d="M225 713 L225 735" class="line"/>

  <rect x="500" y="130" width="430" height="360" rx="10" class="soft"/>
  <text x="715" y="170" class="h" text-anchor="middle">SerialCcoScriptHost</text>
  <text x="715" y="198" class="small" text-anchor="middle">Virtual fixture adapter for controlDvc</text>
  <rect x="540" y="230" width="180" height="70" rx="6" class="box"/>
  <text x="630" y="258" class="t" text-anchor="middle">SetBaudRate</text>
  <text x="630" y="282" class="small" text-anchor="middle">local COM baud</text>
  <rect x="750" y="230" width="180" height="70" rx="6" class="box"/>
  <text x="840" y="258" class="t" text-anchor="middle">Virtual ACK</text>
  <text x="840" y="282" class="small" text-anchor="middle">immediate success</text>
  <rect x="540" y="335" width="180" height="80" rx="6" class="box"/>
  <text x="630" y="365" class="t" text-anchor="middle">STA power</text>
  <text x="630" y="389" class="small" text-anchor="middle">breaker frame</text>
  <rect x="750" y="335" width="180" height="80" rx="6" class="warn"/>
  <text x="840" y="365" class="t" text-anchor="middle">CCO self power</text>
  <text x="840" y="389" class="small" text-anchor="middle">skip / protocol reset</text>

  <rect x="1050" y="210" width="380" height="120" rx="10" class="soft"/>
  <text x="1240" y="250" class="h" text-anchor="middle">processCtrlDvcRes</text>
  <text x="1240" y="282" class="t" text-anchor="middle">isSucs = true</text>
  <text x="1240" y="310" class="t" text-anchor="middle">same dvcType / idList / cmd</text>

  <path d="M355 199 C430 199 450 265 540 265" class="dline"/>
  <path d="M355 269 C430 269 450 265 540 265" class="dline"/>
  <path d="M355 339 C430 339 450 375 540 375" class="dline"/>
  <path d="M355 409 C430 409 450 375 540 375" class="dline"/>
  <path d="M720 265 L750 265" class="dline"/>
  <path d="M720 375 L750 375" class="dline"/>
  <path d="M930 265 L1050 270" class="dline"/>
  <path d="M930 375 C1010 375 1010 300 1050 300" class="dline"/>
  <path d="M1050 310 C780 570 390 490 355 455" class="dline"/>
  <text x="765" y="535" class="small" text-anchor="middle">ACK returns to state machine; wrong dvcType can block BuildNetwork_GW</text>

  <rect x="500" y="610" width="430" height="220" rx="10" class="soft"/>
  <text x="715" y="650" class="h" text-anchor="middle">Real 376.2 Frames</text>
  <rect x="535" y="690" width="95" height="48" rx="5" class="box"/><text x="582" y="720" class="t" text-anchor="middle">01F2</text>
  <rect x="655" y="690" width="95" height="48" rx="5" class="box"/><text x="702" y="720" class="t" text-anchor="middle">01F1</text>
  <rect x="775" y="690" width="95" height="48" rx="5" class="box"/><text x="822" y="720" class="t" text-anchor="middle">05F16</text>
  <rect x="535" y="760" width="95" height="48" rx="5" class="box"/><text x="582" y="790" class="t" text-anchor="middle">11F1</text>
  <rect x="655" y="760" width="140" height="48" rx="5" class="box"/><text x="725" y="790" class="t" text-anchor="middle">10F21</text>

  <rect x="1070" y="620" width="150" height="58" rx="6" class="box"/><text x="1145" y="656" class="t" text-anchor="middle">CCO COM</text>
  <rect x="1280" y="620" width="120" height="58" rx="6" class="box"/><text x="1340" y="656" class="t" text-anchor="middle">CCO</text>
  <rect x="1070" y="760" width="195" height="58" rx="6" class="box"/><text x="1168" y="796" class="t" text-anchor="middle">HPLC Network</text>
  <rect x="1320" y="760" width="115" height="58" rx="6" class="box"/><text x="1378" y="796" class="t" text-anchor="middle">STA</text>
  <rect x="1465" y="760" width="120" height="58" rx="6" class="box"/><text x="1525" y="796" class="t" text-anchor="middle">Meter</text>
  <path d="M930 720 L1070 649" class="line"/>
  <path d="M1220 649 L1280 649" class="line"/>
  <path d="M1340 678 L1168 760" class="line"/>
  <path d="M1265 789 L1320 789" class="line"/>
  <path d="M1435 789 L1465 789" class="line"/>
  <path d="M1525 760 C1460 700 1360 700 1168 760" class="dline"/>
  <text x="1190" y="718" class="small" text-anchor="middle">Real init / archive / topology frames go through CCO serial</text>

  <rect x="1080" y="410" width="320" height="80" rx="8" class="warn"/>
  <text x="1240" y="442" class="t" text-anchor="middle">Smart Breaker optional</text>
  <text x="1240" y="468" class="small" text-anchor="middle">controls STA / environment power only</text>
  <path d="M630 415 C770 520 980 480 1080 450" class="dline"/>

  <rect x="95" y="835" width="420" height="70" rx="8" class="soft"/>
  <text x="305" y="862" class="t" text-anchor="middle">Key rule: virtual control can advance the state machine,</text>
  <text x="305" y="888" class="t" text-anchor="middle">but real test frames still run through CCO and HPLC.</text>
</svg>
